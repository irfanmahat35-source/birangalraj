<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raj Birangal | Professional Video Editor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Inter:wght@300;400;700;900&display=swap');
        
        :root { --accent: #ff3e00; }
        body { background-color: #000; color: #fff; font-family: 'Inter', sans-serif; overflow-x: hidden; scroll-behavior: smooth; }
        
        .raj-title { font-family: 'Syncopate', sans-serif; font-size: clamp(2.2rem, 9vw, 5.5rem); line-height: 0.85; letter-spacing: -3px; text-transform: uppercase; position: relative; z-index: 10; }
        .outline-text { color: transparent; -webkit-text-stroke: 1px rgba(255,255,255,0.3); }
        
        .hero-bg-img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 0; opacity: 0.4; filter: grayscale(80%) contrast(110%); }
        .hero-overlay { position: absolute; inset: 0; background: linear-gradient(to bottom, rgba(0,0,0,0.5) 0%, rgba(0,0,0,1) 100%); z-index: 1; }

        .video-card { position: relative; border: 1px solid rgba(255,255,255,0.1); transition: 0.5s ease; background: #0a0a0a; overflow: hidden; }
        .video-card:hover { border-color: var(--accent); transform: translateY(-5px); box-shadow: 0 10px 30px rgba(255,62,0,0.2); }

        /* Progress Bar Animation */
        .progress-line { height: 2px; background: #1a1a1a; position: relative; width: 100%; }
        .progress-fill { height: 100%; background: var(--accent); box-shadow: 0 0 10px var(--accent); width: 0; transition: width 1.5s cubic-bezier(0.1, 0, 0.2, 1); }

        #mobile-menu.active { transform: translateX(0); }
        .line-1.active { transform: rotate(45deg) translateY(8px); }
        .line-2.active { opacity: 0; }
        .line-3.active { transform: rotate(-45deg) translateY(-8px); width: 24px !important; }
        
        .cv-card { background: linear-gradient(145deg, #0f0f0f, #050505); border: 1px solid rgba(255,62,0,0.1); }
    </style>
</head>
